services:
  mysql:
    image: ${MYSQL_IMAGE}
    container_name: douyin_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE}
    container_name: douyin_redis
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE}
    container_name: douyin_backend
    env_file:
      - ../.env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
    depends_on:
      - mysql
      - redis
    ports:
      - "${BACKEND_PORT}:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE}
    container_name: douyin_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

volumes:
  mysql_data:
